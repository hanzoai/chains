name: Docker (VM plugins)
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        vm: [evm, dexvm, aivm, bridgevm, graphvm, identityvm, keyvm, oraclevm, quantumvm, relayvm, servicenodevm, teleportvm, thresholdvm, zkvm, hanzo-evm]
      fail-fast: false
    runs-on: hanzo-build-linux-amd64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ${{ matrix.vm }}/go.sum
      - name: Build amd64
        working-directory: ${{ matrix.vm }}
        env:
          GONOSUMCHECK: github.com/luxfi/*
          GONOSUMDB: github.com/luxfi/*
          CGO_ENABLED: ${{ matrix.vm == 'evm' && '1' || '0' }}
          CGO_CFLAGS: ${{ matrix.vm == 'evm' && '-O2 -D__BLST_PORTABLE__' || '' }}
        run: |
          go mod tidy
          mkdir -p ../build/amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../build/amd64/${{ matrix.vm }} .
      - name: Build arm64
        working-directory: ${{ matrix.vm }}
        env:
          GONOSUMCHECK: github.com/luxfi/*
          GONOSUMDB: github.com/luxfi/*
          CGO_ENABLED: ${{ matrix.vm == 'evm' && '1' || '0' }}
          CGO_CFLAGS: ${{ matrix.vm == 'evm' && '-O2 -D__BLST_PORTABLE__' || '' }}
        run: |
          mkdir -p ../build/arm64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../build/arm64/${{ matrix.vm }} .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm }}
          path: build/

  docker:
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        vm: [evm, dexvm, aivm, bridgevm, graphvm, identityvm, keyvm, oraclevm, quantumvm, relayvm, servicenodevm, teleportvm, thresholdvm, zkvm, hanzo-evm]
      fail-fast: false
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/chains/${{ matrix.vm }}
      pre-build-command: |
        gh run download ${{ github.run_id }} -n ${{ matrix.vm }} -D . || true
        ls -la build/
        cat > Dockerfile.plugin <<EOF
        FROM scratch
        ARG TARGETARCH
        COPY build/\${TARGETARCH}/${{ matrix.vm }} /plugin
        ENTRYPOINT ["/plugin"]
        EOF
      dockerfile: Dockerfile.plugin
    secrets: inherit
